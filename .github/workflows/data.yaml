name: Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      poe1_version:
        description: 'PoE1 patch override (blank = current)'
        required: false
      poe2_version:
        description: 'PoE2 patch override (blank = current)'
        required: false

concurrency:
  group: data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fetch-versions:
    name: Fetch PoE Versions
    runs-on: ubuntu-latest
    outputs:
      poe1_version: ${{ steps.versions.outputs.poe1_version }}
      poe2_version: ${{ steps.versions.outputs.poe2_version }}
    steps:
      - name: Fetch and validate versions
        id: versions
        env:
          POE1_OVERRIDE: ${{ inputs.poe1_version }}
          POE2_OVERRIDE: ${{ inputs.poe2_version }}
        run: |
          VERSIONS=$(curl -sf https://poe-versions.obsoleet.org/) || VERSIONS='{}'
          POE1=${POE1_OVERRIDE:-$(echo "$VERSIONS" | jq -r '.poe')}
          POE2=${POE2_OVERRIDE:-$(echo "$VERSIONS" | jq -r '.poe2')}

          if [[ "$POE1" =~ ^3(\.[0-9]+)+$ ]]; then
            echo "poe1_version=$POE1" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::poe1 version invalid: '$POE1' - skipping poe1"
          fi
          if [[ "$POE2" =~ ^4(\.[0-9]+)+$ ]]; then
            echo "poe2_version=$POE2" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::poe2 version invalid: '$POE2' - skipping poe2"
          fi

  release:
    name: Release ${{ matrix.game }} data
    needs: fetch-versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        game: [poe1, poe2]
    env:
      GAME: ${{ matrix.game }}
      VERSION: ${{ needs.fetch-versions.outputs[format('{0}_version', matrix.game)] }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v5

      - name: Decide whether to run
        id: gate
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$VERSION" ]; then
            echo "no valid $GAME version, skipping"
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Current Steam content-depot manifest via anonymous PICS (public, no
          # license). Correlates the CDN release to a Steam manifest and lets us
          # skip client-only bumps (where the content manifest is unchanged).
          case "$GAME" in
            poe1) APP=238960; DEPOT=238961 ;;
            poe2) APP=2694490; DEPOT=2694491 ;;
          esac
          pip install --quiet --disable-pip-version-check steam >/dev/null 2>&1 || true
          MANIFEST=$(python3 .github/scripts/pics-manifest.py "$APP" "$DEPOT" 2>/dev/null || true)
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"

          if [ "$FORCE" = "true" ]; then
            echo "run=true (forced), manifest=$MANIFEST"
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RUN=true
          # Already released this CDN version?
          curl -sfIL -o /dev/null "https://github.com/$REPO/releases/download/data-$GAME-$VERSION/manifest.txt" && RUN=false

          # If the Steam content manifest hasn't advanced past the latest CDN
          # release, either it's a client-only bump OR Steam hasn't propagated
          # the new content yet (CDN/Steam aren't lockstep). Either way, skip now
          # and let a later run pick it up once Steam moves — this also keeps the
          # recorded manifest correlated to the CDN version we publish.
          if [ "$RUN" = "true" ] && [ -n "$MANIFEST" ]; then
            LATEST=$(gh release list --repo "$REPO" --limit 1000 --json tagName --jq '.[].tagName' \
              | sed -n "s/^data-$GAME-//p" | grep -E '^[0-9]+(\.[0-9]+)+$' | sort -V | tail -1)
            if [ -n "$LATEST" ]; then
              PREV_M=$(curl -sfL "https://github.com/$REPO/releases/download/data-$GAME-$LATEST/versions.json" | jq -r '.manifest // empty' 2>/dev/null)
              if [ -n "$PREV_M" ] && [ "$MANIFEST" = "$PREV_M" ]; then
                RUN=false
                echo "Steam content manifest $MANIFEST not advanced past $LATEST -> client-only or not yet propagated, skipping (a later run retries)"
              fi
            fi
          fi

          echo "$GAME gate: version=$VERSION manifest=$MANIFEST run=$RUN"
          echo "run=$RUN" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        if: steps.gate.outputs.run == 'true'
        with:
          go-version-file: 'go.mod'

      - name: Generate manifest
        if: steps.gate.outputs.run == 'true'
        run: |
          go build -o exiledb ./cmd/exiledb
          mkdir -p out
          ./exiledb manifest --patch "$VERSION" > out/manifest.txt
          ./exiledb manifest --patch "$VERSION" --stats > out/dat-stats.jsonl

          # Record both version variants: the CDN version (this run) and the exe
          # build tag pulled from the same CDN dir. Builds a CDN<->tag mapping
          # over time that historical backfills can't recover.
          case "$GAME" in poe1) CDN=patch.poecdn.com ;; poe2) CDN=patch-poe2.poecdn.com ;; esac
          EXE_TAG=""
          if curl -sfL "https://$CDN/$VERSION/PathOfExile.exe" -o out/poe.exe; then
            EXE_TAG=$(strings -n 5 out/poe.exe | grep -oiE 'tags/[0-9][0-9.]*[a-z]?' | sed 's|tags/||' | sort -V | tail -1)
          fi
          rm -f out/poe.exe
          printf '{"cdn_version":"%s","manifest":"%s","exe_tag":"%s"}\n' "$VERSION" "${{ steps.gate.outputs.manifest }}" "$EXE_TAG" > out/versions.json

          LINES=$(wc -l < out/manifest.txt)
          if [ "$LINES" -lt 100000 ]; then
            echo "::error::$GAME manifest has only $LINES lines, refusing to publish"
            exit 1
          fi
          DAT_LINES=$(wc -l < out/dat-stats.jsonl)
          if [ "$DAT_LINES" -lt 1000 ]; then
            echo "::error::$GAME dat stats has only $DAT_LINES lines, refusing to publish"
            exit 1
          fi

      - name: Diff against previous release
        if: steps.gate.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          case "$GAME" in
            poe1) TITLE="PoE1" ;;
            poe2) TITLE="PoE2" ;;
          esac
          TOTAL=$(wc -l < out/manifest.txt)
          DAT_TOTAL=$(wc -l < out/dat-stats.jsonl)
          TAGS=$(gh release list --repo "$REPO" --limit 1000 --json tagName --jq '.[].tagName')
          PREV=$({ printf '%s\n' "$TAGS" | sed -n "s/^data-$GAME-//p" | grep -E '^[0-9]+(\.[0-9]+)+$'; echo "$VERSION"; } \
            | sort -uV | awk -v v="$VERSION" '$0==v{print p; exit}{p=$0}')

          TAB=$(printf '\t')
          DAT_LINE="- Dat files: $DAT_TOTAL (\`dat-stats.jsonl\`)"
          if [ -n "$PREV" ] && [ "$PREV" != "$VERSION" ] \
            && curl -sfL "https://github.com/$REPO/releases/download/data-$GAME-$PREV/manifest.txt" -o out/prev.txt \
            && [ "$(wc -l < out/prev.txt)" -ge 100000 ]; then
            LC_ALL=C comm -13 out/prev.txt out/manifest.txt > out/added-files.txt
            LC_ALL=C comm -23 out/prev.txt out/manifest.txt > out/removed-files.txt
            ADDED=$(wc -l < out/added-files.txt)
            REMOVED=$(wc -l < out/removed-files.txt)

            {
              echo "File manifest for $TITLE patch $VERSION."
              echo
              echo "Compared against $PREV:"
              echo "- Total files: $TOTAL"
              echo "- Added: $ADDED (\`added-files.txt\`)"
              echo "- Removed: $REMOVED (\`removed-files.txt\`)"
              echo "$DAT_LINE"
            } > out/notes.md
          else
            {
              echo "File manifest for $TITLE patch $VERSION."
              echo
              echo "- Total files: $TOTAL"
              echo "$DAT_LINE"
              echo
              echo "No previous release available to diff against."
            } > out/notes.md
          fi

      - name: Upsert release
        if: steps.gate.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/data.sh "$GAME"

      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -sS -H "Content-Type: application/json" \
              -d "{\"content\":\"**DATA RELEASE FAILURE** — $GAME $VERSION\\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$DISCORD_WEBHOOK_URL"
          fi
