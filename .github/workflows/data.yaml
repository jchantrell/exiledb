name: Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      poe1_version:
        description: 'PoE1 patch override (blank = current)'
        required: false
      poe2_version:
        description: 'PoE2 patch override (blank = current)'
        required: false

concurrency:
  group: data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fetch-versions:
    name: Fetch PoE Versions
    runs-on: ubuntu-latest
    outputs:
      poe1_version: ${{ steps.versions.outputs.poe1_version }}
      poe2_version: ${{ steps.versions.outputs.poe2_version }}
    steps:
      - name: Fetch and validate versions
        id: versions
        env:
          POE1_OVERRIDE: ${{ inputs.poe1_version }}
          POE2_OVERRIDE: ${{ inputs.poe2_version }}
        run: |
          VERSIONS=$(curl -sf https://poe-versions.obsoleet.org/) || VERSIONS='{}'
          POE1=${POE1_OVERRIDE:-$(echo "$VERSIONS" | jq -r '.poe')}
          POE2=${POE2_OVERRIDE:-$(echo "$VERSIONS" | jq -r '.poe2')}

          if [[ "$POE1" =~ ^3(\.[0-9]+)+$ ]]; then
            echo "poe1_version=$POE1" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::poe1 version invalid: '$POE1' - skipping poe1"
          fi
          if [[ "$POE2" =~ ^4(\.[0-9]+)+$ ]]; then
            echo "poe2_version=$POE2" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::poe2 version invalid: '$POE2' - skipping poe2"
          fi

  release:
    name: Release ${{ matrix.game }} data
    needs: fetch-versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        game: [poe1, poe2]
    env:
      GAME: ${{ matrix.game }}
      VERSION: ${{ needs.fetch-versions.outputs[format('{0}_version', matrix.game)] }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v5

      - name: Decide whether to run
        id: gate
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$VERSION" ]; then
            echo "no valid $GAME version, skipping"
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Current Steam content-depot manifest via anonymous PICS (public, no
          # license). Correlates the CDN release to a Steam manifest and lets us
          # skip client-only bumps (where the content manifest is unchanged).
          case "$GAME" in
            poe1) APP=238960; DEPOT=238961 ;;
            poe2) APP=2694490; DEPOT=2694491 ;;
          esac
          # steam[client], not steam: the bare package ships none of the client
          # dependencies SteamClient needs, so the import fails and the gate
          # silently degrades to a no-op.
          if ! pip install --quiet --disable-pip-version-check 'steam[client]'; then
            echo "::warning::$GAME: installing steam[client] failed, cannot read the Steam manifest"
          fi
          MANIFEST=$(python3 .github/scripts/pics-manifest.py "$APP" "$DEPOT" || true)
          if [ -z "$MANIFEST" ]; then
            # Publish anyway — a gate we can't evaluate shouldn't stop releases —
            # but say so, or the only symptom is a duplicate release and a
            # versions.json quietly missing its manifest.
            echo "::warning::$GAME: no Steam content manifest; publishing without correlation and without the client-only skip"
          fi
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"

          if [ "$FORCE" = "true" ]; then
            echo "run=true (forced), manifest=$MANIFEST"
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RUN=true
          # Already released this CDN version? Ask for the release itself rather
          # than probing an asset, so it stays correct as asset names change.
          gh release view "data-$GAME-$VERSION" --repo "$REPO" >/dev/null 2>&1 && RUN=false

          # If the Steam content manifest hasn't advanced past the latest CDN
          # release, either it's a client-only bump OR Steam hasn't propagated
          # the new content yet (CDN/Steam aren't lockstep). Either way, skip now
          # and let a later run pick it up once Steam moves — this also keeps the
          # recorded manifest correlated to the CDN version we publish.
          if [ "$RUN" = "true" ] && [ -n "$MANIFEST" ]; then
            LATEST=$(gh release list --repo "$REPO" --limit 1000 --json tagName --jq '.[].tagName' \
              | sed -n "s/^data-$GAME-//p" | grep -E '^[0-9]+(\.[0-9]+)+$' | sort -V | tail -1)
            if [ -n "$LATEST" ]; then
              PREV_M=$(curl -sfL "https://github.com/$REPO/releases/download/data-$GAME-$LATEST/versions.json" | jq -r '.manifest // empty' 2>/dev/null)
              if [ -n "$PREV_M" ] && [ "$MANIFEST" = "$PREV_M" ]; then
                RUN=false
                echo "Steam content manifest $MANIFEST not advanced past $LATEST -> client-only or not yet propagated, skipping (a later run retries)"
              fi
            fi
          fi

          echo "$GAME gate: version=$VERSION manifest=$MANIFEST run=$RUN"
          echo "run=$RUN" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        if: steps.gate.outputs.run == 'true'
        with:
          go-version-file: 'go.mod'

      - name: Generate manifest
        if: steps.gate.outputs.run == 'true'
        run: |
          go build -o exiledb ./cmd/exiledb
          mkdir -p out
          ./exiledb manifest --patch "$VERSION" > out/manifest.txt
          ./exiledb manifest --patch "$VERSION" --stats > out/dat-stats.jsonl

          # The client version is read from the exe, the same way the historical
          # backfill reads it from the program depot — it is the one label both
          # eras can derive without human input, so it names the release.
          case "$GAME" in poe1) CDN=patch.poecdn.com ;; poe2) CDN=patch-poe2.poecdn.com ;; esac
          CLIENT_VERSION=""
          if curl -sfL "https://$CDN/$VERSION/PathOfExile.exe" -o out/poe.exe; then
            CLIENT_VERSION=$(strings -n 5 out/poe.exe | grep -oiE 'tags/[0-9][0-9.]*[a-z]?' | sed 's|tags/||' | sort -V | tail -1)
          fi
          rm -f out/poe.exe

          # One schema across both eras (see backfill/cmd/backfill/artifacts.go).
          # cdn_version is CI-only — it is unrecoverable for historical patches —
          # and epoch here is publish time rather than the exact push time
          # SteamDB gives the backfill.
          jq -n --arg game "$GAME" --arg cv "$CLIENT_VERSION" --arg date "$(date -u +%F)" \
                --argjson epoch "$(date -u +%s)" --arg manifest "${{ steps.gate.outputs.manifest }}" \
                --arg cdn "$VERSION" \
            '{game:$game, date:$date, epoch:$epoch, cdn_version:$cdn}
             + (if $cv == "" then {} else {client_version:$cv} end)
             + (if $manifest == "" then {} else {manifest:$manifest} end)' > out/versions.json

          # exiledb exits non-zero on a failed extract and this step runs under
          # errexit, so that is the real guard. These only catch a success that
          # somehow wrote nothing; a line-count floor would just encode today's
          # table count and break on legitimate changes.
          for f in out/manifest.txt out/dat-stats.jsonl; do
            if [ ! -s "$f" ]; then
              echo "::error::$GAME produced an empty $f, refusing to publish"
              exit 1
            fi
          done

      - name: Diff against previous release
        if: steps.gate.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          case "$GAME" in
            poe1) TITLE="PoE1" ;;
            poe2) TITLE="PoE2" ;;
          esac
          TOTAL=$(wc -l < out/manifest.txt)
          DAT_TOTAL=$(wc -l < out/dat-stats.jsonl)
          TAGS=$(gh release list --repo "$REPO" --limit 1000 --json tagName --jq '.[].tagName')
          PREV=$({ printf '%s\n' "$TAGS" | sed -n "s/^data-$GAME-//p" | grep -E '^[0-9]+(\.[0-9]+)+$'; echo "$VERSION"; } \
            | sort -uV | awk -v v="$VERSION" '$0==v{print p; exit}{p=$0}')

          TAB=$(printf '\t')
          DAT_LINE="- Dat tables: $DAT_TOTAL (\`dat-stats.jsonl\`)"
          # Releases before the gzip switch carry a raw manifest.txt; newer ones
          # carry manifest.txt.gz. Accept either so the transition needs no
          # backfilling of old releases.
          BASE="https://github.com/$REPO/releases/download/data-$GAME-$PREV"
          PREV_OK=false
          if [ -n "$PREV" ] && [ "$PREV" != "$VERSION" ]; then
            if curl -sfL "$BASE/manifest.txt.gz" -o out/prev.txt.gz && [ -s out/prev.txt.gz ]; then
              gunzip -f out/prev.txt.gz && PREV_OK=true
            elif curl -sfL "$BASE/manifest.txt" -o out/prev.txt && [ -s out/prev.txt ]; then
              PREV_OK=true
            fi
          fi

          if [ "$PREV_OK" = true ]; then
            LC_ALL=C comm -13 out/prev.txt out/manifest.txt > out/added-files.txt
            LC_ALL=C comm -23 out/prev.txt out/manifest.txt > out/removed-files.txt
            ADDED=$(wc -l < out/added-files.txt)
            REMOVED=$(wc -l < out/removed-files.txt)

            # Summarise how the dat tables moved. The per-table diff itself isn't
            # published — it's derivable from any two dat-stats.jsonl — but the
            # counts are what tell you at a glance whether this is a real content
            # patch or a value tweak.
            if curl -sfL "$BASE/dat-stats.jsonl" -o out/dat-prev.jsonl && [ -s out/dat-prev.jsonl ]; then
              flatten() { jq -r '[.path,.sha256,.row_count,.row_width,.var_size]|@tsv' "$1" | LC_ALL=C sort -t"$TAB" -k1,1; }
              flatten out/dat-prev.jsonl > out/dat-prev.tsv
              flatten out/dat-stats.jsonl > out/dat-cur.tsv
              DAT_ADDED=$(LC_ALL=C join -t"$TAB" -v2 -o 2.1 out/dat-prev.tsv out/dat-cur.tsv | grep -c . || true)
              DAT_REMOVED=$(LC_ALL=C join -t"$TAB" -v1 -o 1.1 out/dat-prev.tsv out/dat-cur.tsv | grep -c . || true)
              CLS=$(LC_ALL=C join -t"$TAB" -o 1.2,2.2,1.3,2.3,1.4,2.4,1.5,2.5 out/dat-prev.tsv out/dat-cur.tsv \
                | awk -F"$TAB" '$1!=$2 { print ($5!=$6)?"schema":($3!=$4)?"rows":($7!=$8)?"data":"value" }')
              DAT_CHANGED=$(printf '%s' "$CLS" | grep -c . || true)
              DAT_VALUE=$(printf '%s' "$CLS" | grep -c '^value$' || true)
              DAT_LINE="- Dat tables: $DAT_TOTAL — $DAT_ADDED added, $DAT_REMOVED removed, $DAT_CHANGED changed ($DAT_VALUE value-only) (\`dat-stats.jsonl\`)"
              rm -f out/dat-prev.jsonl out/dat-prev.tsv out/dat-cur.tsv
            fi

            {
              echo "File manifest for $TITLE patch $VERSION."
              echo
              echo "Compared against $PREV:"
              echo "- Total files: $TOTAL"
              echo "- Added: $ADDED (\`added-files.txt\`)"
              echo "- Removed: $REMOVED (\`removed-files.txt\`)"
              echo "$DAT_LINE"
            } > out/notes.md
          else
            {
              echo "File manifest for $TITLE patch $VERSION."
              echo
              echo "- Total files: $TOTAL"
              echo "$DAT_LINE"
              echo
              echo "No previous release available to diff against."
            } > out/notes.md
          fi
          rm -f out/prev.txt

          # manifest.txt is by far the largest asset (66-265MB) and compresses
          # ~15x. Release assets always download rather than preview in the UI,
          # so gzipping costs nothing but a gunzip. The small, browsable assets
          # stay raw.
          gzip -9 out/manifest.txt

      - name: Upsert release
        if: steps.gate.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/data.sh "$GAME"

      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -sS -H "Content-Type: application/json" \
              -d "{\"content\":\"**DATA RELEASE FAILURE** — $GAME $VERSION\\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$DISCORD_WEBHOOK_URL"
          fi
